<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIT | R2 Neural Uplink</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --chat-bg: #161b22;
            --user-msg: #21262d;
            --bot-msg: transparent;
            --accent: #00ffff;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; height: 100vh;
        }
        header {
            text-align: center; padding: 15px; border-bottom: 1px solid #30363d;
        }
        header h1 { margin: 0; color: var(--accent); font-family: 'Courier New', Courier, monospace; font-size: 1.5rem; letter-spacing: 2px;}
        header p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 0.85rem; }
        
        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px; max-width: 900px; margin: 0 auto; width: 100%;
            display: flex; flex-direction: column; gap: 15px;
        }
        .message {
            max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.5;
            word-wrap: break-word; font-size: 0.95rem;
        }
        .message.user {
            background-color: var(--user-msg); border: 1px solid #30363d; align-self: flex-end;
        }
        .message.bot {
            background-color: var(--bot-msg); align-self: flex-start; border-left: 2px solid var(--accent);
        }
        .message img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #30363d; }
        
        #input-area {
            max-width: 900px; margin: 0 auto; width: 100%; padding: 20px; box-sizing: border-box;
        }
        .input-wrapper {
            display: flex; gap: 10px; background: #161b22; padding: 10px; border-radius: 12px;
            border: 1px solid #30363d; box-shadow: 0 0 15px rgba(0, 255, 255, 0.05);
        }
        input[type="text"] {
            flex: 1; background: transparent; border: none; color: white; font-size: 1rem;
            outline: none; padding: 5px; font-family: 'Courier New', Courier, monospace;
        }
        button {
            background: var(--accent); color: black; border: none; padding: 10px 20px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #00cccc; box-shadow: 0 0 10px rgba(0, 255, 255, 0.4); }
    </style>
</head>
<body>

    <header>
        <h1>R2 CORE SYSTEM</h1>
        <p>Terminal Neural Ativo • Módulos: Text & Image</p>
    </header>

    <div id="chat-container">
        <div class="message bot">🟢 Uplink estabelecido. Sistemas online. Como posso ajudar?</div>
    </div>

    <div id="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Digite um comando ou /img para gerar imagens..." autocomplete="off">
            <button onclick="sendMessage()">ENVIAR</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('user-input');
        let ws;

        // Conecta ao WebSocket para streaming de texto
        function connectWebSocket() {
            ws = new WebSocket(`ws://${window.location.host}/ws/chat`);
            ws.onmessage = function(event) {
                // Se for o primeiro pedaço da resposta, cria a bolha. Senão, adiciona texto.
                let lastMsg = chatContainer.lastElementChild;
                if (!lastMsg || lastMsg.classList.contains('user') || lastMsg.dataset.complete === "true") {
                    addMessage("", 'bot');
                    lastMsg = chatContainer.lastElementChild;
                    lastMsg.dataset.complete = "false";
                }
                
                if (event.data === "[DONE]") {
                    lastMsg.dataset.complete = "true";
                } else {
                    lastMsg.innerHTML += event.data.replace(/\n/g, '<br>');
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            };
            ws.onclose = () => setTimeout(connectWebSocket, 2000); // Tenta reconectar se cair
        }

        function addMessage(content, sender, isHtml = false) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            if (isHtml) div.innerHTML = content;
            else div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            inputField.value = '';

            // Rota de Imagem (/img)
            if (text.toLowerCase().startsWith('/img ') || text.toLowerCase().startsWith('/imagem ')) {
                const prompt = text.replace(/^\/(img|imagem)\s+/i, '');
                const loader = addMessage("🎨 Renderizando imagem. Aguarde...", 'bot');
                
                try {
                    const response = await fetch('/api/image', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: prompt })
                    });
                    const data = await response.json();
                    
                    if (data.status === "success") {
                        loader.innerHTML = `✅ Renderização concluída:<br><img src="${data.image_url}" alt="Gerada pela IA">`;
                    } else {
                        loader.innerHTML = `⚠️ Erro de renderização: ${data.error}`;
                    }
                } catch (e) {
                    loader.innerHTML = `⚠️ Erro de comunicação com o servidor.`;
                }
                return;
            }

            // Rota de Texto (WebSocket)
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(text);
            } else {
                addMessage("⚠️ Conexão com o servidor perdida.", 'bot');
            }
        }

        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        connectWebSocket();
    </script>
</body>
</html>
